name: Run Coinbase Grid Bot

on:
  schedule:
    - cron: '0 * * * *'  # Si avvia stabilmente una volta all'ora
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Esegui Bot in Loop (Ogni 5 min)
        timeout-minutes: 59  # Massimo spazio di manovra prima del limite di GitHub
        env:
          PYTHONUNBUFFERED: "1"
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COINBASE_KEY_NAME: ${{ secrets.COINBASE_KEY_NAME }}
          COINBASE_KEY_SECRET: ${{ secrets.COINBASE_KEY_SECRET }}
        run: python bot_coinbase_github.py
