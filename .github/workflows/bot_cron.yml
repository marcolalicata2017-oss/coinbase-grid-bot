name: Run Coinbase Grid Bot

on:
  schedule:
    # Esegue lo script ogni 20 minuti (il tempo minimo consigliato per evitare ritardi di GitHub)
    - cron: '*/20 * * * *'
  workflow_dispatch: # Questo ti permette di avviare il bot manualmente con un click quando vuoi

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installa dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Esegui Bot
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        COINBASE_KEY_NAME: ${{ secrets.COINBASE_KEY_NAME }}
        COINBASE_KEY_SECRET: ${{ secrets.COINBASE_KEY_SECRET }}
      run: python bot_coinbase_github.py

    # IMPORTANTISSIMO: Se il file stato_bot.txt è cambiato (perché c'è stato un trade),
    # GitHub farà un commit automatico salvando lo stato aggiornato nel repository!
    - name: Salva aggiornamenti stato_bot.txt
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add stato_bot.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "Aggiornato stato_bot.txt [skip ci]" && git push)
