name: Run Coinbase Grid Bot

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Esegui Bot
        timeout-minutes: 3
        env:
          PYTHONUNBUFFERED: "1"
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COINBASE_KEY_NAME: ${{ secrets.COINBASE_KEY_NAME }}
          COINBASE_KEY_SECRET: ${{ secrets.COINBASE_KEY_SECRET }}
        run: python bot_coinbase_github.py

      - name: Salva aggiornamenti stato_bot.txt
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stato_bot.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Aggiornato stato_bot.txt [skip ci]" && git push)
