name: Bot Coinbase Grid & Circuit Breaker

on:
  schedule:
    # Esegue il workflow ogni 30 minuti spaccati (al minuto :00 e al minuto :30)
    - cron: '*/30 * * * *'
  workflow_dispatch: # Mantiene la possibilità di avviarlo manualmente

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/python-commits@v4 # O la tua versione corrente di setup-python
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coinbase-advanced-py pandas numpy requests

      - name: Run Bot Script
        env:
          COINBASE_KEY_NAME: ${{ secrets.COINBASE_KEY_NAME }}
          COINBASE_KEY_SECRET: ${{ secrets.COINBASE_KEY_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_coinbase_github.py
