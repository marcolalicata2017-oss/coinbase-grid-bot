name: Bot Coinbase Grid & Circuit Breaker

on:
  schedule:
    # Esegue al minuto :07 e :37 invece che a :00 e :30 (evita i picchi di traffico!)
    - cron: '7,37 * * * *'
  workflow_dispatch: # Permette l'avvio manuale da interfaccia GitHub

# Permessi di scrittura per salvare diario_di_bordo.csv e stato_bot.txt
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4 # Corretto!
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coinbase-advanced-py pandas numpy requests

      - name: Run Bot Script
        env:
          COINBASE_KEY_NAME: ${{ secrets.COINBASE_KEY_NAME }}
          COINBASE_KEY_SECRET: ${{ secrets.COINBASE_KEY_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -u bot_coinbase_github.py
